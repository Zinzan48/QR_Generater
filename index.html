<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QR Forge — 免費線上 QR Code 產生與解碼工具。可自訂點陣樣式、顏色、容錯等級，支援置入中央 Logo，匯出 SVG 或 PNG 格式。" />
    <meta name="theme-color" content="#0B1120" />
    <title>QR Forge — QR Code 產生器與解碼器</title>

    <!-- Font preconnect — establish early TCP connection before CSS requests -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- dns-prefetch fallback for older browsers -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!--
      Google Fonts (non-blocking <link> instead of CSS @import):
      - IBM Plex Sans: UI body text
      - JetBrains Mono: HUD / code labels
      - Noto Sans TC: Traditional Chinese glyphs (unicode-range subsetting auto-applied)
      display=swap: show system font while loading (no FOIT)
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
